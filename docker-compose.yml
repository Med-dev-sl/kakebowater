services:
  redis:
    image: redis:7-alpine
    container_name: kakebowater-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - kakebowater-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kakebowater-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - REDIS_CACHE_TTL=300
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kakebowater-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: kakebowater-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - nginx_cache:/var/cache/nginx
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - kakebowater-network

volumes:
  redis_data:
  nginx_cache:

networks:
  kakebowater-network:
    driver: bridge
