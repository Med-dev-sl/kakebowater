worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main buffer=16k;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 1000;
  reset_timedout_connection on;
  client_body_timeout 10;
  send_timeout 2;
  types_hash_max_size 2048;
  server_tokens off;

  client_max_body_size 10m;
  client_body_buffer_size 128k;
  client_header_buffer_size 1k;
  large_client_header_buffers 4 8k;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_types
    application/javascript
    application/json
    application/manifest+json
    application/rss+xml
    application/webfont
    application/x-font-ttf
    application/x-javascript
    application/xhtml+xml
    application/xml
    font/opentype
    font/woff2
    image/svg+xml
    image/x-icon
    text/css
    text/javascript
    text/plain
    text/xml;

  # Brotli (if module available)
  brotli on;
  brotli_comp_level 6;
  brotli_types
    application/javascript
    application/json
    application/manifest+json
    application/x-javascript
    application/xml
    font/woff2
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  # Cache zone for proxy
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=next_cache:10m max_size=1g inactive=60m use_temp_path=off;
  proxy_cache_key "$scheme$request_method$host$request_uri";

  # Upstream
  upstream nextjs {
    server app:3000;
    keepalive 256;
  }

  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Static assets — aggressive cache
    location /_next/static {
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      expires 365d;
      add_header Cache-Control "public, immutable, must-revalidate";
      access_log off;
    }

    location /static {
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      expires 365d;
      add_header Cache-Control "public, immutable, must-revalidate";
      access_log off;
    }

    # Public assets
    location /public {
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      expires 7d;
      add_header Cache-Control "public, must-revalidate";
    }

    # Favicon / robots
    location ~ ^/(favicon.ico|robots.txt|sitemap.xml) {
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;

      expires 24h;
      add_header Cache-Control "public, must-revalidate";
    }

    # Main app — cache HTML with stale-while-revalidate
    location / {
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_cache next_cache;
      proxy_cache_bypass $http_cache_control;
      proxy_no_cache $http_pragma $http_authorization;
      proxy_cache_valid 200 5m;
      proxy_cache_valid 404 1m;
      proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
      proxy_cache_lock on;
      proxy_cache_lock_timeout 5s;

      add_header X-Cache-Status $upstream_cache_status;

      proxy_connect_timeout 5;
      proxy_send_timeout 10;
      proxy_read_timeout 10;
    }
  }
}
