apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: kakebowater
data:
  NODE_ENV: "production"
  REDIS_CACHE_TTL: "300"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kakebowater
  namespace: kakebowater
  labels:
    app: kakebowater
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kakebowater
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kakebowater
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: app
          image: kakebowater:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: REDIS_CACHE_TTL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_CACHE_TTL
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NODE_ENV
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kakebowater
  namespace: kakebowater
  labels:
    app: kakebowater
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: kakebowater
