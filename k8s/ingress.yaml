apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kakebowater
  namespace: kakebowater
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-cache: "on"
    nginx.ingress.kubernetes.io/proxy-cache-valid: "200 5m"
    nginx.ingress.kubernetes.io/proxy-cache-valid: "404 1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "10"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - kakebowater.example.com
      secretName: kakebowater-tls
  rules:
    - host: kakebowater.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kakebowater
                port:
                  name: http
